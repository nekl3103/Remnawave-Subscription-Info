name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: terminal-linux-amd64
          - goos: darwin
            goarch: amd64
            name: terminal-macos-intel
          - goos: darwin
            goarch: arm64
            name: terminal-macos-apple-silicon
          - goos: windows
            goarch: amd64
            name: terminal-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.name }}" .

      - name: Archive
        run: |
          mkdir -p dist/package
          cp "dist/${{ matrix.name }}" dist/package/
          chmod +x "dist/package/${{ matrix.name }}" || true
          cd dist/package
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip "../${{ matrix.name }}.zip" "${{ matrix.name }}"
          else
            tar -czf "../${{ matrix.name }}.tar.gz" "${{ matrix.name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
